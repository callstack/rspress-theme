name: Deploy
on:
    push:
        branches:
            - main
jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pages: write
        steps:
          - name: Checkout
            uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
            with:
              persist-credentials: true
    
          - name: Setup pnpm
            uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
            with:
              version: 9.12.2
    
          - name: Setup Node.js
            uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
            with:
              node-version-file: .nvmrc
              cache: 'pnpm'
    
          - name: Install dependencies
            run: pnpm install --frozen-lockfile
    
          - name: Build project packages
            run: pnpm run build
    
          - name: Build tester package
            working-directory: packages/tester
            env:
              NODE_ENV: production
              RSPRESS_BASE: /${{ github.event.repository.name }}/
            run: pnpm run build

          - name: Deploy
            uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # tag v4.8.0
            with:
              folder: packages/tester/doc_build
              branch: gh-pages
              clean-exclude: pr-preview
              force: false