name: 'Build Docs'
description: 'Setup environment and build documentation packages'

inputs:
  rspress-base:
    description: 'The value for RSPRESS_BASE environment variable'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: 11.9.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc

    - name: Install dependencies
      if: ${{ github.event.action != 'closed' }}
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Build project packages
      if: ${{ github.event.action != 'closed' }}
      run: pnpm run build
      shell: bash

    - name: Build tester package
      if: ${{ github.event.action != 'closed' }}
      working-directory: packages/tester
      env:
        NODE_ENV: production
        RSPRESS_BASE: ${{ inputs.rspress-base }}
      run: pnpm run build
      shell: bash
