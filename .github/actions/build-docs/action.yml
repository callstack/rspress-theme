name: 'Build Docs'
description: 'Setup environment and build documentation packages'

inputs:
  rspress-base:
    description: 'The value for RSPRESS_BASE environment variable'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        version: 11.3.0

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version-file: .nvmrc

    - name: Install dependencies
      if: ${{ github.event.action != 'closed' }}
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Build project packages
      if: ${{ github.event.action != 'closed' }}
      run: pnpm run build
      shell: bash

    - name: Build tester package
      if: ${{ github.event.action != 'closed' }}
      working-directory: packages/tester
      env:
        NODE_ENV: production
        RSPRESS_BASE: ${{ inputs.rspress-base }}
      run: pnpm run build
      shell: bash
