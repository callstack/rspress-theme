name: 'Build Docs'
description: 'Setup environment and build documentation packages'

inputs:
  rspress-base:
    description: 'The value for RSPRESS_BASE environment variable'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        persist-credentials: true

    - name: Setup pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      with:
        version: 9.12.2

    - name: Setup Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version-file: .nvmrc
        cache: 'pnpm'

    - name: Install dependencies
      if: ${{ github.event.action != 'closed' }}
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Build project packages
      if: ${{ github.event.action != 'closed' }}
      run: pnpm run build
      shell: bash

    - name: Build tester package
      if: ${{ github.event.action != 'closed' }}
      working-directory: packages/tester
      env:
        NODE_ENV: production
        RSPRESS_BASE: ${{ inputs.rspress-base }}
      run: pnpm run build
      shell: bash
